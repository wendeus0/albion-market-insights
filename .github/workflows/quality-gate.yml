name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node_version: [24, 20]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node_version }}
          cache: npm

      - name: Pin npm version
        run: npm install --global npm@10.8.2

      - name: Show runtime versions
        run: |
          echo "Node matrix=${{ matrix.node_version }}"
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Run quality gate
        run: npm run quality:gate

      - name: Install Playwright browser (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: npm run test:e2e:smoke

      - name: Enforce coverage threshold (gradual)
        if: matrix.node_version == 24
        run: |
          SUMMARY_FILE="coverage/coverage-summary.json"
          FINAL_FILE="coverage/coverage-final.json"

          THRESHOLD=88

          node <<'NODE'
          const fs = require('node:fs');

          const threshold = Number(process.env.THRESHOLD || '88');
          let pct;

          if (fs.existsSync('coverage/coverage-summary.json')) {
            const summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            pct = summary.total?.statements?.pct;
          } else if (fs.existsSync('coverage/coverage-final.json')) {
            const finalCoverage = JSON.parse(fs.readFileSync('coverage/coverage-final.json', 'utf8'));
            let total = 0;
            let covered = 0;

            for (const fileData of Object.values(finalCoverage)) {
              const statements = fileData?.s || {};
              for (const count of Object.values(statements)) {
                total += 1;
                if (typeof count === 'number' && count > 0) covered += 1;
              }
            }

            pct = total > 0 ? Number(((covered / total) * 100).toFixed(2)) : undefined;
          }

          if (typeof pct !== 'number') {
            console.error('Could not read statements coverage percentage from coverage-summary or coverage-final');
            process.exit(1);
          }

          console.log(`Statements coverage: ${pct}% (threshold: ${threshold}%)`);
          if (pct < threshold) {
            console.error(`Coverage below threshold: ${pct}% < ${threshold}%`);
            process.exit(1);
          }
          NODE
        env:
          THRESHOLD: "88"

      - name: Node 24 rollback hint
        if: matrix.node_version == 24
        run: |
          echo "Node 24 validation lane enabled."
          echo "Rollback imediato: editar matrix para [20] e reexecutar pipeline."
